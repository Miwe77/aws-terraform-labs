apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-miwe77
spec:
  replicas: 2 # ВЎVamos a pedirle a ArgoCD que nos mantenga 2 copias vivas!
  selector:
    matchLabels:
      app: web-miwe77
  template:
    metadata:
      labels:
        app: web-miwe77
    spec:
      containers:
      - name: echo-server
        image: hashicorp/http-echo
        args:
        - "-text=нєЂ ВЎHola desde el repositorio de Miwe77! ArgoCD ha desplegado esto automГЎticamente."
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: web-miwe77-svc
spec:
  selector:
    app: web-miwe77
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5678
